<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日报告中心</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="6" rx="1" fill="#f5f0e6"/><rect x="8" y="1" width="5" height="3" rx="1" fill="#c8b898"/><rect x="1" y="9" width="5" height="4" rx="1" fill="#c8b898"/><rect x="8" y="6" width="5" height="7" rx="1" fill="#f5f0e6"/></svg>
    </div>
    <div>
      <div class="logo-name">日报中心</div>
      <div class="logo-sub">AI时代 · 组织与人才</div>
    </div>
  </div>
  <nav>
    <div class="nav-section">功能</div>
    <a class="nav-item active" onclick="showPage('today',this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      今日日报
    </a>
    <a class="nav-item" onclick="showPage('history',this)">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      历史记录
    </a>
    <a class="nav-item" onclick="showPage('config',this)">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14M3.5 3.5l1 1M11.5 11.5l1 1M12.5 3.5l-1 1M4.5 11.5l-1 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      配置管理
    </a>
  </nav>
  <div class="sidebar-stats">
    <div class="stat-box">
      <div class="stat-row"><span class="stat-label">今日新增</span><span class="stat-val accent" id="s-today">—</span></div>
      <div class="stat-row"><span class="stat-label">历史总计</span><span class="stat-val" id="s-total">—</span></div>
    </div>
  </div>
</aside>

<main class="main">

<!-- TODAY -->
<section id="page-today" class="page active">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <h1 id="today-title">今日日报</h1>
        <p class="page-sub" id="today-sub">加载中...</p>
      </div>
      <div class="header-actions">
        <button class="btn-outline" onclick="exportData('excel')">⬇ Excel</button>
        <button class="btn-outline" onclick="exportData('pdf')">⬇ PDF</button>
        <button class="btn-primary" id="fetch-btn" onclick="triggerFetch()">立即抓取</button>
      </div>
    </div>
  </div>
  <div class="content-area">
    <div id="today-content"><div class="empty-state">点击「立即抓取」获取今日报告</div></div>
  </div>
</section>

<!-- HISTORY -->
<section id="page-history" class="page">
  <div class="topbar">
    <div class="topbar-row">
      <div><h1>历史记录</h1></div>
      <div class="header-actions">
        <button class="btn-outline" onclick="exportData('excel')">⬇ Excel</button>
        <button class="btn-outline" onclick="exportData('pdf')">⬇ PDF</button>
      </div>
    </div>
  </div>
  <div class="content-area">
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M13 13l-2.5-2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <input id="h-search" type="text" placeholder="搜索标题、机构、来源、标签…" oninput="debounceSearch()">
      </div>
      <div class="date-range">
        <input type="date" id="h-from" onchange="loadHistory()">
        <span>—</span>
        <input type="date" id="h-to" onchange="loadHistory()">
      </div>
    </div>
    <div id="topic-chips" class="chip-row"></div>
    <div id="history-content"></div>
    <div id="h-pagination" class="pagination"></div>
  </div>
</section>

<!-- CONFIG -->
<section id="page-config" class="page">
  <div class="topbar">
    <div class="topbar-row"><div><h1>配置管理</h1></div></div>
  </div>
  <div class="content-area">
    <div class="config-grid">
      <div class="card">
        <div class="card-head"><span>抓取来源</span><button class="btn-sm" onclick="openAddSource()">+ 添加</button></div>
        <div id="sources-list"></div>
      </div>
      <div class="card">
        <div class="card-head"><span>搜索关键词</span><button class="btn-sm" onclick="openAddKeyword()">+ 添加</button></div>
        <div id="keywords-list"></div>
      </div>
      <div class="card" style="grid-column:1/-1">
        <div class="card-head"><span>主题分类</span><button class="btn-sm" onclick="openAddTopic()">+ 添加</button></div>
        <div id="topics-list"></div>
      </div>
    </div>
  </div>
</section>

</main>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><span id="modal-title">添加</span><button onclick="closeModal()">✕</button></div>
    <div id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="modal-confirm">确认</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/js/app.js"></script>
</body>
</html>
